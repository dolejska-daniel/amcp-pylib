name: Test and build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install lint tools
        run: python -m pip install ".[lint]"

      - name: Run Ruff
        run: python -m ruff check amcp_pylib tests

  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tools
        run: python -m pip install ".[build]"

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test wheel install
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install --no-index --find-links dist amcp-pylib
          .venv-smoke/bin/python -I -c "import importlib.util; from amcp_pylib.core import Client, ClientAsync; from amcp_pylib.module.query import VERSION; assert importlib.util.find_spec('amcp_pylib.tests') is None; assert str(VERSION(component='server')).strip() == 'VERSION server'; assert str(VERSION()).strip() == 'VERSION'"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/
